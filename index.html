<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Todo List - Blue Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color1: #1f1f20;
            --color2: #2b4c7e;
            --color3: #567ebb;
            --color4: #606d80;
            --color5: #dce0e6;

            --bg-card: rgba(255, 255, 255, 0.7);
            --text-main: var(--color1);
            --text-title: var(--color2);
            --border-color: var(--color4);
            
            --priority-high: var(--color2);
            --priority-medium: var(--color3);
            --priority-low: var(--color4);
        }

        body {
            display: flex;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            background-color: var(--color5);
            background-image: repeating-linear-gradient(45deg, var(--color4) 25%, transparent 25%, transparent 75%, var(--color4) 75%, var(--color4)), repeating-linear-gradient(45deg, var(--color4) 25%, var(--color5) 25%, var(--color5) 75%, var(--color4) 75%, var(--color4));
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
            background-attachment: fixed;
        }

        #sidebar, #main, dialog {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #sidebar {
            width: 280px;
            background-color: var(--bg-card);
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        #sidebar h2 { color: var(--text-title); font-weight: 700; margin-top: 0; }
        #project-list { list-style: none; padding: 0; flex-grow: 1; overflow-y: auto; }
        
        #project-list li {
            padding: 12px 15px; margin-bottom: 8px; cursor: pointer;
            border-radius: 4px; transition: 0.2s; color: var(--color2);
            display: flex; justify-content: space-between; align-items: center;
        }

        #project-list li:hover { background-color: rgba(0,0,0,0.05); }
        #project-list li.active {
            background-color: rgba(0,0,0,0.1); color: var(--color1); font-weight: 600;
            border-left: 4px solid var(--color2);
        }

        #main { padding: 40px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        #current-project-title { color: var(--text-title); border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 0; }
        #task-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }

        .task-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px; padding: 20px; cursor: pointer; position: relative;
            transition: transform 0.2s;
        }
        
        .task-card:hover { transform: translateY(-3px); border-color: var(--color2); }
        .task-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; border-radius: 6px 6px 0 0; }
        .task-card.priority-high::after { background-color: var(--priority-high); }
        .task-card.priority-medium::after { background-color: var(--priority-medium); }
        .task-card.priority-low::after { background-color: var(--priority-low); }

        button {
            border-radius: 4px; border: 1px solid var(--color2); background: transparent;
            color: var(--color2); font-weight: 600; padding: 10px 20px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: var(--color2); color: #fff; }

        #btn-new-task { align-self: flex-start; }

        dialog { background-color: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        dialog h3 { margin-top: 0; color: var(--color2); }
        dialog input, dialog select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Projetos</h2>
        <ul id="project-list"></ul>
        <button id="btn-new-project">+ Novo Projeto</button>
    </div>
    <div id="main">
        <h2 id="current-project-title">Carregando...</h2>
        <div id="task-list"></div>
        <button id="btn-new-task">+ Nova Tarefa</button>
    </div>

    <dialog id="modal-project">
        <form id="form-project">
            <h3>Novo Projeto</h3>
            <input type="text" id="project-name" placeholder="Nome do Projeto" required>
            <div class="modal-actions">
                <button type="button" onclick="document.getElementById('modal-project').close()">Cancelar</button>
                <button type="submit">Criar</button>
            </div>
        </form>
    </dialog>

    <dialog id="modal-task">
        <form id="form-task">
            <h3>Nova Tarefa</h3>
            <input type="text" id="task-title" placeholder="Título" required>
            <input type="text" id="task-desc" placeholder="Descrição">
            <input type="date" id="task-date" required>
            <select id="task-priority">
                <option value="Baixa">Baixa</option>
                <option value="Media" selected>Média</option>
                <option value="Alta">Alta</option>
            </select>
            <div class="modal-actions">
                <button type="button" onclick="document.getElementById('modal-task').close()">Cancelar</button>
                <button type="submit">Adicionar</button>
            </div>
        </form>
    </dialog>

    <script src="main.js"></script>
</body>
</html>
